name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    env:
      SITE_TITLE: Cognitive ETL
      SITE_AUTHOR: Prabakaran Chandran
      SITE_URL: https://prabakaranc98.github.io/cogETL
      SITE_DESCRIPTION: A knowledge graph that compounds.

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build storefront
        run: ./scripts/cognitive_etl.sh build

      - name: Verify Pages bundle
        run: |
          test -f dist/index.html
          test -f dist/captures.html
          test -f dist/graph.html
          test -f dist/atoms.html
          test -f dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
